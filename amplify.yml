version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Exponer las env vars configuradas en la consola de Amplify al runtime
        # SSR: Next.js solo las incluye en la Lambda si existen en un archivo
        # .env.production en tiempo de build.
        # Importante: NO filtramos AWS_* porque en runtime Lambda las inyecta
        # automáticamente desde el IAM role (AWS_REGION, AWS_ACCESS_KEY_ID,
        # AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN). Si las empotráramos aquí
        # con valores del build, sobrescribirían las credenciales del role.
        # Las NEXT_PUBLIC_* deben coincidir con el nombre completo (NEXT_PUBLIC_APP_URL,
        # NEXT_PUBLIC_STRIPE_*, etc.). Un patrón literal "NEXT_PUBLIC_=" no coincide nunca.
        # GUEST_COOKIE_ENABLED: middleware consume ?gt= y setea cookie httpOnly (ver lib/auth/guest-cookie.ts).
        # RATE_LIMIT_BACKEND: "memory" (default) o "dynamo" para rate-limit persistente (lib/rate-limit.ts).
        - env | grep -E '^(USERS_TABLE_NAME|POSTS_TABLE_NAME|PROGRAMACION_TABLE_NAME|PROGRAMACION_S3_BUCKET|ROULETTE_TABLE_NAME|RESERVATIONS_TABLE_NAME|RESERVATION_DOCS_S3_BUCKET|RESERVATIONS_STAFF_ALERT_EMAIL|STRIPE_SECRET_KEY|STRIPE_WEBHOOK_SECRET|SESSION_SECRET|SES_FROM_EMAIL|FECHA_LIMITE_COMPRA_CARNET|GUEST_COOKIE_ENABLED|RATE_LIMIT_BACKEND)=' >> .env.production
        - env | grep -E '^NEXT_PUBLIC_' >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .npm/**/*
